---
- name: Initialize Private RDS via SSM Bastion
  hosts: bastion
  gather_facts: false

  tasks:
    - name: Install PostgreSQL client on Amazon Linux 2023
      ansible.builtin.dnf:
        name: postgresql15
        state: present
      become: true

    - name: Fetch DB Password securely from AWS Secrets Manager
      ansible.builtin.set_fact:
        # We use the amazon.aws collection to look up the secret securely
        db_password: "{{ lookup('amazon.aws.aws_secret', db_secret_arn,
          region=ansible_aws_region) }}"
      no_log: true # CRITICAL: Prevents the password from printing in Ansible terminal logs

    - name: Copy init.sql to the Bastion host
      ansible.builtin.copy:
        src: ./init.sql
        dest: /tmp/init.sql
        mode: "0644"

    - name: Execute init.sql (Idempotent Run)
      ansible.builtin.shell: |
        # Run the SQL script
        psql -h {{ db_host }} -p {{ db_port }} -U {{ db_user }} -d {{ db_name }} -f /tmp/init.sql

        # If successful, create a flag file
        touch /var/tmp/rds_init_complete
      environment:
        PGPASSWORD: "{{ db_password }}"
      args:
        # ANSBILE MAGIC: This task will be SKIPPED entirely if this file exists on the Bastion
        creates: /var/tmp/rds_init_complete
