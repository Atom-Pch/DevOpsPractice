--- # UNUSED. MOVED INTO CI/CD
- name: Frontend ECR Push Latest Tag
  hosts: local
  gather_facts: false
  vars:
    aws_region: "us-east-2"
    ecr_registry: "131912109503.dkr.ecr.us-east-2.amazonaws.com"
    image_name: "todo-frontend-repo"
    full_image_path: "{{ ecr_registry }}/{{ image_name }}:latest"
    project_directory: "../../../frontend"

  tasks:
    - name: Authenticate Docker client to AWS ECR
      ansible.builtin.shell: |
        set -o pipefail
        aws ecr get-login-password --region {{ aws_region }} | docker login --username AWS --password-stdin {{ ecr_registry }}
      args:
        executable: /bin/bash
      register: login_output
      changed_when: "'Login Succeeded' in login_output.stdout"

    - name: Build the Docker image
      ansible.builtin.command: docker build --provenance=false -t {{ image_name }} .
      args:
        chdir: "{{ project_directory }}"
      register: build_output
      changed_when: "'naming to docker.io' not in build_output.stderr"

    - name: Tag the Docker image for ECR
      ansible.builtin.command: docker tag {{ image_name }}:latest {{ full_image_path }}
      changed_when: false

    - name: Push the Docker image to AWS ECR
      ansible.builtin.command: docker push {{ full_image_path }}
      register: push_output
      changed_when: "'Pushed' in push_output.stdout or 'layer already exists' not in
        push_output.stdout"

- name: ECR Push Version Tag
  hosts: local
  gather_facts: false
  vars:
    aws_region: "us-east-2"
    ecr_registry: "131912109503.dkr.ecr.us-east-2.amazonaws.com"
    image_name: "todo-frontend-repo"
    project_directory: "../../../frontend"

  tasks:
    - name: Fetch highest 'v' tag from ECR
      ansible.builtin.shell: >
        aws ecr describe-images --region {{ aws_region }} --repository-name {{
        image_name }} --query 'imageDetails[*].imageTags[*]' --output text | tr
        '\t' '\n' | grep '^v[0-9]' | sed 's/v//' | sort -n | tail -1
      register: highest_tag_output
      ignore_errors: true
      changed_when: false

    - name: Calculate next tag version
      ansible.builtin.set_fact:
        # If output is empty (no previous tags or repo is empty), start at 1. Otherwise, increment by 1.
        next_version_num: "{{ (highest_tag_output.stdout | int) + 1 if
          highest_tag_output.stdout != '' else 1 }}"

    - name: Set image tag variables
      ansible.builtin.set_fact:
        image_tag: "v{{ next_version_num }}"
        full_image_path: "{{ ecr_registry }}/{{ image_name }}:v{{ next_version_num }}"

    - name: Display calculated tag
      ansible.builtin.debug:
        msg: "The calculated tag for this build is {{ image_tag }}"

    - name: Authenticate Docker client to AWS ECR
      ansible.builtin.shell: |
        set -o pipefail
        aws ecr get-login-password --region {{ aws_region }} | docker login --username AWS --password-stdin {{ ecr_registry }}
      args:
        executable: /bin/bash
      register: login_output
      changed_when: "'Login Succeeded' in login_output.stdout"

    - name: Build the Docker image
      ansible.builtin.command: docker build --provenance=false -t {{ image_name }} .
      args:
        chdir: "{{ project_directory }}"
      register: build_output
      changed_when: "'naming to docker.io' not in build_output.stderr"

    - name: Tag the Docker image for ECR
      ansible.builtin.command: docker tag {{ image_name }}:latest {{ full_image_path }}
      changed_when: false

    - name: Push the Docker image to AWS ECR
      ansible.builtin.command: docker push {{ full_image_path }}
      register: push_output
      changed_when: "'Pushed' in push_output.stdout or 'layer already exists' not in
        push_output.stdout"
